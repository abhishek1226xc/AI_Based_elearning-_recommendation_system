version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      LOCAL_AI_FALLBACK: "true"
      DATABASE_URL: ./data/elearning.db
    ports:
      - "3000:3000"
    volumes:
      - app_data:/app/data
    restart: unless-stopped

volumes:
  app_data:
